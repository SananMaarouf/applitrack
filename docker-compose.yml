services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-applitrack}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-applitrack}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      # Use container env vars, not host-side substitution
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  applitrack:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
        CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SITE_URL: "${SITE_URL}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-applitrack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-applitrack}"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
      CRON_SECRET: "${CRON_SECRET}"

    # If Dokploy uses Swarm/Traefik, prefer deploy.labels
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=dokploy-network"
        - "traefik.http.routers.applitrack.rule=Host(`applitrack.no`) || Host(`www.applitrack.no`)"
        - "traefik.http.routers.applitrack.entrypoints=websecure"
        - "traefik.http.routers.applitrack.tls.certresolver=letsencrypt"
        - "traefik.http.services.applitrack.loadbalancer.server.port=3000"

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
services:

# The Applitrack next.js application
  applitrack:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
        CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
        SITE_URL: "${SITE_URL}"
        DATABASE_URL: "postgresql://${POSTGRES_USER:-applitrack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-applitrack}"
    restart: always
    ports:
      - "3000:3000"
    networks:
      - dokploy-network
    labels:
        - traefik.enable=true
        - traefik.http.routers.applitrack.rule=Host(`applitrack.no`)
        - traefik.http.routers.applitrack.entrypoints=websecure"
        - traefik.http.routers.applitrack.tls.certResolver=letsencrypt"
        - traefik.http.services.applitrack.loadbalancer.server.port=3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SITE_URL: "${SITE_URL}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-applitrack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-applitrack}"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
    
# The Postgres database for Applitrack
  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-applitrack}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-applitrack}"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-applitrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

# defining a volume to persist Postgres data
volumes:
  postgres_data:
    driver: local

# defining a network to connect the services
networks:
  dokploy-network:
    driver: bridge
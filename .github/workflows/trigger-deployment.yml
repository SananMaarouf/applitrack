name: Trigger Dokploy Deployment

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    branches: [backend-refactor]
    types:
      - completed
  workflow_dispatch:

jobs:
  trigger-deployment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      DOKPLOY_DEPLOY_HOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Dokploy deployment
        if: env.DOKPLOY_DEPLOY_HOOK_URL != ''
        env:
          DOKPLOY_DEPLOY_HOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_HOOK_URL }}
          CF_ACCESS_CLIENT_ID: ${{ env.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ env.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          echo "Triggering Dokploy deployment..."
          echo "=================================================="

          # NOTE: Avoid using `curl -v` here because it can print request headers
          # (including Cloudflare Access credentials) into GitHub Actions logs.
          # We still capture the response body for debugging.
          HTTP_CODE=$( (curl -X POST "$DOKPLOY_DEPLOY_HOOK_URL" \
            -H "Content-Type: application/json" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -A "Applitrack-GitHub-Actions-Deploy-Script" \
            -d '{}' \
            -o /tmp/response.txt \
            -w "%{http_code}" \
            --silent \
            --show-error \
            -L \
            --max-time 30 \
            --connect-timeout 10) || echo "000")
          
          RESPONSE_BODY=$(cat /tmp/response.txt 2>/dev/null || echo "No response body")
          
          echo ""
          echo "📊 Response Status: $HTTP_CODE"
          echo "=================================================="
          
          # Try to pretty-print JSON response
          if echo "$RESPONSE_BODY" | jq . > /dev/null 2>&1; then
            echo "📄 Response Body (formatted):"
            echo "$RESPONSE_BODY" | jq .
            IS_JSON=true
          elif echo "$RESPONSE_BODY" | grep -q "<html"; then
            echo "📄 Response Body (HTML - extracted text):"
            # Extract title and main error message from HTML
            TITLE=$(echo "$RESPONSE_BODY" | grep -oP '(?<=<title>)[^<]+' || echo "")
            ERROR_MSG=$(echo "$RESPONSE_BODY" | sed 's/<[^>]*>//g' | grep -v '^[[:space:]]*$' | head -20)
            if [ -n "$TITLE" ]; then
              echo "Title: $TITLE"
              echo ""
            fi
            echo "$ERROR_MSG"
            IS_JSON=false
          else
            echo "📄 Response Body:"
            echo "$RESPONSE_BODY"
            IS_JSON=false
          fi
          echo "=================================================="
          
          # Check for success
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 204 ]; then
            echo "✅ Deployment triggered successfully!"
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.event.workflow_run.head_branch || github.ref_name }}"
            echo "Commit: ${{ github.event.workflow_run.head_sha || github.sha }}"
            exit 0
          fi
          
          # Handle specific error cases
          if [ "$HTTP_CODE" -eq 403 ]; then
            echo ""
            echo "❌ Error: Access Denied (403)"
            echo "=================================================="
            if [ "$IS_JSON" = true ]; then
               echo "👉 This looks like a BACKEND error (from Dokploy), not Cloudflare."
               echo "   Check if your DOKPLOY_DEPLOY_HOOK_URL is correct."
            else
               echo "👉 This looks like a CLOUDFLARE error."
               echo "   Possible issues:"
               echo "   1. WAF/Bot Fight Mode is blocking the request (User-Agent added in this attempt)."
               echo "   2. Service Token is not correctly added to the 'gh_dokploy_deploy' policy."
               echo "   3. The policy Action is not set to 'Service Auth'."
            fi
            exit 1
          elif [ "$HTTP_CODE" -eq 0 ] || [ "$HTTP_CODE" -eq 000 ]; then
            echo ""
            echo "❌ Error: Connection failed - request did not reach server"
            echo "=================================================="
            echo "Possible issues:"
            echo "  - Network timeout"
            echo "  - DNS resolution failure"
            echo "  - Cloudflare blocking at network level"
            exit 1
          elif [ "$HTTP_CODE" -ge 500 ]; then
            echo ""
            echo "⚠️  Warning: Server error ($HTTP_CODE)"
            echo "=================================================="
            echo "The request reached the server but it returned an error"
            exit 1
          else
            echo ""
            echo "⚠️  Warning: Unexpected response code: $HTTP_CODE"
            echo "=================================================="
            exit 1
          fi
